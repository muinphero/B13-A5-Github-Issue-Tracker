<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Login Section -->
    <section id="loginSection" class="w-full max-w-[620px] mx-auto mt-8">
      <div class="max-w-[520px] mx-auto bg-[#ffffff] rounded-md shadow-md p-6">
        <div class="text-center mb-4">
          <img
            src="./assets/github-logo.png"
            alt="GitHub Logo"
            class="w-[86px] h-[86px] mx-auto mb-3"
          />
          <h1 class="text-[40px] font-bold text-slate-800 leading-tight">
            GitHub Issues Tracker
          </h1>
          <p class="text-[16px] text-slate-500 mt-1">
            Sign in to manage your issues
          </p>
        </div>

        <form id="loginForm" class="space-y-3">
          <div>
            <label
              for="username"
              class="block text-[15px] font-medium text-slate-700 mb-1"
            >
              Username
            </label>
            <input
              id="username"
              type="text"
              placeholder="Enter Username"
              class="w-full h-[42px] px-3 text-[14px] rounded-md border border-slate-300 bg-white outline-none focus:border-slate-400"
              required
            />
            <p class="text-[13px] text-[#3b1df5] mt-1">Default: admin</p>
          </div>

          <div>
            <label
              for="password"
              class="block text-[15px] font-medium text-slate-700 mb-1"
            >
              Password
            </label>
            <input
              id="password"
              type="password"
              placeholder="Enter Password"
              class="w-full h-[42px] px-3 text-[14px] rounded-md border border-slate-300 bg-white outline-none focus:border-slate-400"
              required
            />
            <p class="text-[13px] text-[#3b1df5] mt-1">Default: admin123</p>
          </div>

          <button
            type="submit"
            class="w-full h-[42px] mt-1 rounded-md bg-[#3b1df5] hover:bg-[#2f14db] text-white text-[15px] font-semibold"
          >
            Sign In
          </button>
        </form>

        <div class="my-4 border-t border-slate-200 relative">
          <span
            class="absolute left-1/2 -translate-x-1/2 -top-[10px] bg-[#ffffff] px-3 text-[13px] text-slate-600"
          >
            OR
          </span>
        </div>

        <p class="text-center text-[13px] text-slate-500 mb-2">
          Demo Credentials:
        </p>

        <div
          class="bg-[#eceff3] rounded-md p-4 text-center text-[14px] text-slate-700 leading-6"
        >
          <p><span class="font-semibold">Username:</span> admin</p>
          <p><span class="font-semibold">Password:</span> admin123</p>
        </div>

        <p
          id="loginError"
          class="text-red-500 text-[13px] mt-3 hidden"
          aria-live="polite"
        ></p>
      </div>
    </section>

    <script src="app.js"></script>
  </body>
</html>
