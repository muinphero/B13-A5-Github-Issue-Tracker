<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Login Section -->
    <section id="loginSection" class="w-full max-w-[620px] mx-auto mt-8">
      <div class="max-w-[520px] mx-auto bg-[#ffffff] rounded-md shadow-md p-6">
        <div class="text-center mb-4">
          <img
            src="./assets/github-logo.png"
            alt="GitHub Logo"
            class="w-[86px] h-[86px] mx-auto mb-3"
          />
          <h1 class="text-[40px] font-bold text-slate-800 leading-tight">
            GitHub Issues Tracker
          </h1>
          <p class="text-[16px] text-slate-500 mt-1">
            Sign in to manage your issues
          </p>
        </div>

        <form id="loginForm" class="space-y-3">
          <div>
            <label
              for="username"
              class="block text-[15px] font-medium text-slate-700 mb-1"
            >
              Username
            </label>
            <input
              id="username"
              type="text"
              placeholder="Enter Username"
              class="w-full h-[42px] px-3 text-[14px] rounded-md border border-slate-300 bg-white outline-none focus:border-slate-400"
              required
            />
            <p class="text-[13px] text-[#3b1df5] mt-1">Default: admin</p>
          </div>

          <div>
            <label
              for="password"
              class="block text-[15px] font-medium text-slate-700 mb-1"
            >
              Password
            </label>
            <input
              id="password"
              type="password"
              placeholder="Enter Password"
              class="w-full h-[42px] px-3 text-[14px] rounded-md border border-slate-300 bg-white outline-none focus:border-slate-400"
              required
            />
            <p class="text-[13px] text-[#3b1df5] mt-1">Default: admin123</p>
          </div>

          <button
            type="submit"
            class="w-full h-[42px] mt-1 rounded-md bg-[#3b1df5] hover:bg-[#2f14db] text-white text-[15px] font-semibold"
          >
            Sign In
          </button>
        </form>

        <div class="my-4 border-t border-slate-200 relative">
          <span
            class="absolute left-1/2 -translate-x-1/2 -top-[10px] bg-[#ffffff] px-3 text-[13px] text-slate-600"
          >
            OR
          </span>
        </div>

        <p class="text-center text-[13px] text-slate-500 mb-2">
          Demo Credentials:
        </p>

        <div
          class="bg-[#eceff3] rounded-md p-4 text-center text-[14px] text-slate-700 leading-6"
        >
          <p><span class="font-semibold">Username:</span> admin</p>
          <p><span class="font-semibold">Password:</span> admin123</p>
        </div>

        <p
          id="loginError"
          class="text-red-500 text-[13px] mt-3 hidden"
          aria-live="polite"
        ></p>
      </div>
    </section>

    <!-- Main Tracker Section (hidden by default) -->
    <section id="mainSection" class="hidden min-h-screen bg-[#f7f8fa]">
      <!-- Navbar -->
      <nav class="w-full bg-white border-b border-slate-200">
        <div
          class="max-w-[1200px] mx-auto px-4 py-4 flex flex-col md:flex-row gap-3 md:items-center md:justify-between"
        >
          <div class="flex items-center gap-2">
            <img
              src="./assets/github-logo.png"
              alt="GitHub Logo"
              class="w-8 h-8"
            />
            <h2 class="text-xl font-bold text-slate-800">
              GitHub Issues Tracker
            </h2>
          </div>

          <form id="searchForm" class="flex items-center gap-2">
            <input
              id="searchInput"
              type="text"
              placeholder="Search issues..."
              class="h-10 px-3 rounded-md border border-slate-300 outline-none w-[220px] md:w-[280px]"
            />
            <button
              type="submit"
              class="h-10 px-4 rounded-md bg-[#3b1df5] text-white font-medium"
            >
              Search
            </button>
          </form>
        </div>
      </nav>

      <!-- Issue Content -->
      <div class="max-w-[1200px] mx-auto px-4 py-6">
        <!-- Tabs -->
        <div class="flex gap-2 mb-4">
          <button
            id="tabAll"
            class="tab-btn h-10 px-4 rounded-md bg-white text-slate-700 border border-slate-300"
          >
            All
          </button>
          <button
            id="tabOpen"
            class="tab-btn h-10 px-4 rounded-md bg-white text-slate-700 border border-slate-300"
          >
            Open
          </button>
          <button
            id="tabClosed"
            class="tab-btn h-10 px-4 rounded-md bg-white text-slate-700 border border-slate-300"
          >
            Closed
          </button>
        </div>

        <!-- Summary Row -->
        <div
          class="bg-white rounded-md border border-slate-200 p-4 flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-5"
        >
          <div class="flex items-center gap-2 text-slate-700">
            <img src="./assets/Aperture.png" alt="Issue Icon" class="w-5 h-5" />
            <p>
              <span id="issueCount" class="font-bold">0</span>
              issues found
            </p>
          </div>

          <div class="flex items-center gap-4 text-sm">
            <div class="flex items-center gap-1">
              <img src="./assets/Open-Status.png" alt="Open" class="w-4 h-4" />
              <span id="openCount">0 Open</span>
            </div>
            <div class="flex items-center gap-1">
              <img
                src="./assets/Closed- Status .png"
                alt="Closed"
                class="w-4 h-4"
              />
              <span id="closedCount">0 Closed</span>
            </div>
          </div>
        </div>

        <!-- Loading -->
        <div id="loadingSpinner" class="hidden flex justify-center py-10">
          <span
            class="loading loading-spinner loading-lg text-[#3b1df5]"
          ></span>
        </div>

        <!-- Empty State -->
        <p id="emptyMessage" class="hidden text-center text-slate-500 py-8">
          No issues found.
        </p>

        <!-- Card Grid -->
        <div
          id="issuesContainer"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"
        ></div>
      </div>

      <!-- Issue Details Modal -->
      <dialog id="issueModal" class="modal">
        <div class="modal-box max-w-2xl">
          <h3 id="modalTitle" class="text-xl font-bold text-slate-800 mb-2">
            Issue Details
          </h3>
          <div id="modalContent" class="text-sm text-slate-700 space-y-2">
            Loading issue details...
          </div>
          <div class="modal-action">
            <form method="dialog">
              <button class="btn">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </section>

    <script src="app.js"></script>
  </body>
</html>
